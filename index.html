<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather-Cast</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Weather-Cast</h1>

<div class="search-box">
<input
type="text"
id="cityInput"
placeholder="Enter City Name">

<button id="searchBtn">
Search
</button>
</div>

<div id="weatherCard">

<img id="icon" src="" alt="">

<p id="condition"></p>

<p id="humidity"></p>

<p id="message"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
